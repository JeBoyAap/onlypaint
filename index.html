<!DOCTYPE html>
<html>
    <head>
        <title>Paint</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        
        <div class="toolbar">
            <button id="clear-canvas-button" class="controls">Clear Canvas</button>
            <input type="color" id="color-input" class="controls" autocomplete="off">
            <input type="number" id="pen-size-input" class="controls" min="0" max="100" step="1" value="2" autocomplete="off" >
        </div>
        
        <div class="canvas-container">
            <canvas id="drawing-canvas"></canvas>
        </div>
        

    </body>

    <script src="index.js" defer></script>
</html>
